apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
type: Opaque
data:
  MYSQL_ROOT_PASSWORD: {{ .Values.db.secret.rootPassword | b64enc | quote }}
  MYSQL_PASSWORD: {{ .Values.db.secret.password | b64enc | quote }}
  MYSQL_DATABASE: {{ .Values.db.secret.database | b64enc | quote }}
  MYSQL_USER: {{ .Values.db.secret.user | b64enc | quote }}
